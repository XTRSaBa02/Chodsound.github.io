<!-- Crop & Download Fragment -->
<div
    class="fixed inset-0 z-[150] bg-slate-900/95 backdrop-blur-md overflow-y-auto flex items-center justify-center p-4">
    <div
        class="bg-white dark:bg-slate-900 w-full max-w-4xl shadow-2xl rounded-3xl overflow-hidden flex flex-col border border-slate-200 dark:border-slate-800">
        <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-primary/10 rounded-lg flex items-center justify-center">
                    <span class="material-symbols-rounded text-primary">content_cut</span>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-slate-900 dark:text-white">Download & Crop</h2>
                    <p id="cropper-title" class="text-xs text-slate-500 dark:text-slate-400">Loading track...</p>
                </div>
            </div>
            <button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full nav-link" data-route="home">
                <span class="material-symbols-rounded">close</span>
            </button>
        </div>
        <div class="p-6">
            <!-- Cropper UI -->
            <div class="mb-4 text-sm font-medium text-slate-600 dark:text-slate-400">
                Drag the highlighted region to select the part of the track you want to download.
            </div>
            <div id="cropper-waveform"
                class="w-full h-32 bg-slate-50 dark:bg-slate-950/50 rounded-2xl border border-slate-200 dark:border-slate-800 mb-4 cursor-col-resize">
                <!-- Hydrated by Wavesurfer -->
            </div>

            <!-- Zoom Control -->
            <div
                class="flex items-center gap-3 mb-6 bg-slate-50 dark:bg-slate-800/50 p-3 rounded-xl border border-slate-200 dark:border-slate-800">
                <span class="material-symbols-rounded text-slate-500 text-sm">zoom_out</span>
                <input type="range" id="cropper-zoom-slider" min="10" max="500" value="10"
                    class="flex-1 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer accent-primary"
                    title="Zoom Waveform" aria-label="Zoom Waveform">
                <span class="material-symbols-rounded text-slate-500 text-sm">zoom_in</span>
                <span class="text-[10px] font-mono font-bold text-slate-400 w-8" id="zoom-value">10x</span>
            </div>

            <div class="flex items-center gap-4 mb-6">
                <label for="cropper-format" class="text-sm font-bold text-slate-700 dark:text-slate-300">Export
                    Format:</label>
                <select id="cropper-format" name="format" title="Export Format" aria-label="Export Format"
                    class="bg-slate-100 dark:bg-slate-800 border-none rounded-xl px-4 py-2 focus:ring-2 focus:ring-primary outline-none dark:text-white font-medium">
                    <option value="wav">WAV (Lossless)</option>
                    <option value="mp3">MP3 (Compressed)</option>
                </select>
                <div class="ml-auto text-sm text-slate-500 font-mono" id="cropper-time-info">0:00 - 0:00</div>
            </div>
            <div class="flex justify-end gap-4">
                <button
                    class="px-6 py-2 text-slate-600 dark:text-slate-400 font-semibold nav-link hover:text-red-500 transition-colors"
                    data-route="home">Cancel</button>
                <button id="btn-download-crop"
                    class="px-8 py-3 bg-primary hover:bg-brand-deep text-white rounded-full font-bold shadow-lg shadow-primary/20 transition-all flex items-center gap-2">
                    <span id="cropper-spinner" class="material-symbols-rounded animate-spin hidden">sync</span>
                    <span id="cropper-btn-text">Download Selection</span>
                </button>
            </div>
        </div>
    </div>
</div>
