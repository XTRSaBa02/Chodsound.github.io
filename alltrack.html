<!-- All Tracks Discovery Fragment -->
<main class="flex-1 max-w-7xl mx-auto px-6 py-8 w-full mb-32">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
        <div>
            <h1 class="text-3xl font-black text-slate-900 dark:text-white">Discover Tracks</h1>
            <p class="text-slate-500 font-medium">Explore everything ChodSound has to offer</p>
        </div>
        
        <div class="flex items-center gap-3 bg-white dark:bg-slate-900 p-2 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
            <span class="text-sm font-bold text-slate-400 pl-2">Sort By:</span>
            <select id="alltracks-sort" title="Sort Tracks" aria-label="Sort Tracks"
                class="bg-slate-100 dark:bg-slate-800 border-none rounded-xl px-4 py-2 focus:ring-2 focus:ring-primary outline-none dark:text-white font-bold text-sm cursor-pointer appearance-none">
                <option value="newest">Newest First</option>
                <option value="plays">Most Listened</option>
                <option value="likes">Most Liked</option>
            </select>
        </div>
    </div>

    <div id="alltracks-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <div class="col-span-full py-20 flex flex-col items-center justify-center text-primary">
            <span class="material-symbols-rounded animate-spin text-5xl mb-4">sync</span>
            <p class="text-slate-500 font-bold">Fetching the sounds of the world...</p>
        </div>
    </div>
</main>
