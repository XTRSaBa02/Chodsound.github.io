<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>ChodSound - Audio Cropper Management</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#00609b",
            "brand-darkest": "#001d3d",
            "brand-deep": "#003566",
            "brand-muted": "#669bbc",
            "brand-light": "#b9d6f2",
            "background-light": "#f1f5f9",
            "background-dark": "#020617",
            "deep-navy": "#001b3d",
            "accent-blue": "#6a9ab0",
            "soft-blue": "#b2c8df",
            navy: {
              900: "#001B3D",
              800: "#002852",
              700: "#00325F",
            },
            accent: {
              light: "#B8D0E0",
              medium: "#6B9CB5",
            },
            "surface-light": "#ffffff",
            "surface-dark": "#0f172a"
          },
          fontFamily: {
            display: ["Inter", "sans-serif"],
            sans: ["Inter", "sans-serif"],
          },
          borderRadius: {
            DEFAULT: "0.75rem",
          },
        },
      },
    };
  </script>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Wavesurfer.js & Audio Processing plugins -->
  <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
  <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
  
  <!-- Cropper.js -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

  <style>
    .material-symbols-rounded,
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }
  </style>
</head>

<body
  class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col pb-24 transition-colors duration-300">

  <!-- Global Header / Navbar -->
  <header
    class="sticky top-0 z-50 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between gap-8">
      <div class="flex items-center gap-2 cursor-pointer nav-link" data-route="home">
        <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white">
          <span class="material-symbols-rounded text-xl">graphic_eq</span>
        </div>
        <span class="font-bold text-xl tracking-tight text-primary">ChodSound</span>
      </div>

      <form id="search-form" class="flex-1 max-w-xl relative hidden md:block">
        <button type="submit"
          class="absolute inset-y-0 left-3 flex items-center text-slate-400 hover:text-primary transition-colors">
          <span class="material-symbols-rounded">search</span>
        </button>
        <input id="global-search-input"
          class="w-full bg-slate-100 dark:bg-slate-800/50 border-none rounded-full py-2 pl-10 pr-4 focus:ring-2 focus:ring-primary text-sm placeholder-slate-500 outline-none"
          placeholder="Search artists, tracks, or genres..." type="text" />
      </form>

      <nav class="hidden md:flex items-center gap-6">
        <a class="text-sm font-medium hover:text-primary transition-colors cursor-pointer nav-link"
          data-route="following">Following</a>
        <a class="text-sm font-medium hover:text-primary transition-colors cursor-pointer nav-link"
          data-route="profile">Library</a>
        <a class="px-4 py-2 bg-primary text-white text-sm font-semibold rounded-full hover:opacity-90 transition-opacity cursor-pointer shadow-lg shadow-primary/20 nav-link"
          data-route="upload">Upload</a>

        <button
          class="flex items-center justify-center p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
          onclick="document.documentElement.classList.toggle('dark')">
          <span class="material-symbols-rounded block dark:hidden">dark_mode</span>
          <span class="material-symbols-rounded hidden dark:block">light_mode</span>
        </button>

        <!-- Auth Section -->
        <div id="auth-container" class="flex items-center gap-3">
          <button class="text-sm font-semibold hover:text-primary cursor-pointer nav-link" data-route="auth">Sign
            In</button>
        </div>

        <!-- User Profile -->
        <div id="user-menu" class="hidden flex items-center gap-3">
          <div
            class="w-8 h-8 rounded-full bg-slate-300 dark:bg-slate-700 overflow-hidden border border-slate-200 dark:border-slate-700 cursor-pointer nav-link"
            data-route="profile">
            <img id="header-user-avatar" alt="User avatar"
              src="https://ui-avatars.com/api/?name=User&background=1e293b&color=fff" />
          </div>
        </div>
      </nav>
    </div>
  </header>

  <!-- Main Content Injection Point -->
  <div id="app-content" class="w-full flex-1">
    <!-- Fetched HTML will be injected here via app.js -->
    <div class="flex justify-center items-center h-64">
      <span class="material-symbols-rounded animate-spin text-4xl text-primary">sync</span>
    </div>
  </div>

  <!-- Global Persistent Footer Player -->
  <footer
    class="fixed bottom-0 inset-x-0 h-24 bg-white/90 dark:bg-brand-darkest/90 backdrop-blur-xl border-t border-slate-200 dark:border-slate-800 z-[100] px-6 flex items-center justify-between shadow-[0_-4px_20px_rgba(0,0,0,0.05)] dark:shadow-[0_-4px_20px_rgba(0,0,0,0.2)]">
    <div class="flex items-center gap-4 w-1/4">
      <img alt="Mini Album Art" id="player-art"
        class="w-12 h-12 rounded shadow object-cover hover:scale-105 transition-transform cursor-pointer hidden"
        data-route="audioplay"
        src="https://images.unsplash.com/photo-1614149162883-504ce4d1ed15?auto=format&fit=crop&w=200&q=80" />

      <div class="hidden sm:block cursor-pointer min-w-0" data-route="audioplay">
        <p class="font-bold text-sm truncate" id="player-title">Welcome to ChodSound</p>
        <p class="text-xs text-slate-500 dark:text-slate-400 truncate" id="player-artist">Select a track to play</p>
      </div>

      <button class="ml-2 text-slate-400 hover:text-pink-500 transition-colors hidden lg:block" id="btn-like-player">
        <span class="material-symbols-rounded text-xl">favorite</span>
      </button>
    </div>

    <div class="flex-1 max-w-2xl flex flex-col items-center gap-2">
      <div class="flex items-center gap-4 md:gap-6">
        <button id="btn-shuffle" class="text-slate-400 hover:text-primary transition-colors hidden sm:block"><span
            class="material-symbols-rounded">shuffle</span></button>
        <button class="text-slate-500 dark:text-slate-300 hover:text-primary transition-colors" id="btn-prev"><span
            class="material-symbols-rounded text-[28px]">skip_previous</span></button>
        <button
          class="w-12 h-12 bg-primary text-white rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-all shadow-md shadow-primary/30"
          id="btn-play-pause">
          <span class="material-symbols-rounded fill-current text-[32px]" id="play-icon">play_arrow</span>
        </button>
        <button class="text-slate-500 dark:text-slate-300 hover:text-primary transition-colors" id="btn-next"><span
            class="material-symbols-rounded text-[28px]">skip_next</span></button>
        <button id="btn-repeat" class="text-slate-400 hover:text-primary transition-colors hidden sm:block"><span
            class="material-symbols-rounded">repeat</span></button>
      </div>

      <div class="w-full flex items-center gap-3 px-4">
        <span class="text-[10px] font-bold text-slate-400 font-mono w-8 text-right" id="time-current">0:00</span>
        <div class="flex-1 h-2 bg-slate-200 dark:bg-slate-700/50 rounded-full relative group cursor-pointer"
          id="player-progress-container">
          <div
            class="absolute inset-y-0 left-0 w-[0%] bg-primary rounded-full transition-all duration-100 ease-linear pointer-events-none"
            id="player-progress"></div>
          <!-- Visible handle on hover -->
          <div
            class="absolute top-1/2 left-[0%] -translate-y-1/2 w-4 h-4 bg-white border-4 border-primary rounded-full opacity-0 group-hover:opacity-100 transition-opacity shadow-lg pointer-events-none"
            id="player-thumb"></div>
        </div>
        <span class="text-[10px] font-bold text-slate-400 font-mono w-8" id="time-total">0:00</span>
      </div>
    </div>

    <div class="flex items-center justify-end gap-4 md:gap-6 w-1/4">
      <button class="text-slate-400 hover:text-primary transition-colors hidden xl:block nav-link"
        data-route="croppload" title="Crop & Download">
        <span class="material-symbols-rounded">content_cut</span>
      </button>
      <button class="text-slate-400 hover:text-primary transition-colors hidden xl:block" id="btn-playlist-player"
        title="Add to Playlist">
        <span class="material-symbols-rounded">queue_music</span>
      </button>
      <div class="flex items-center gap-2 group cursor-pointer" id="volume-container">
        <span class="material-symbols-rounded text-slate-400 group-hover:text-primary transition-colors text-sm"
          id="btn-volume">volume_up</span>
        <input type="range" class="w-20 accent-primary hidden md:block" id="volume-slider" min="0" max="1" step="0.01"
          value="1" title="Volume slider" aria-label="Volume">
      </div>
    </div>
  </footer>

  <!-- Hidden Audio Element -->
  <audio id="core-audio-element" src="" preload="metadata"></audio>

  <!-- ChodSound Unified Logic v4 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/chod-app-bundle-v4.js?v=4.1" defer></script>
</body>

</html>
